services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: it_knowledge_base
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d it_knowledge_base"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/it_knowledge_base
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 8h
      PORT: 3000
      NODE_ENV: production
      FRONTEND_URL: http://localhost
      GMAIL_EMAIL: ${GMAIL_EMAIL}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}
      GMAIL_SYNC_CRON: ${GMAIL_SYNC_CRON:-0 */4 * * *}
      GMAIL_SYNC_DAYS: ${GMAIL_SYNC_DAYS:-90}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
