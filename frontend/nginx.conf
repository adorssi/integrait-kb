server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy para el backend — reemplaza el proxy de Vite usado en desarrollo
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Aumentar timeout para operaciones largas (sync de backups)
        proxy_read_timeout 120s;
    }

    # Ruta de uploads/archivos si el backend los sirve
    location /uploads/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # SPA: todas las rutas desconocidas van al index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caché para assets estáticos con hash en el nombre
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
